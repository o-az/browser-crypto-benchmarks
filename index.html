<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Browser Crypto Benchmark</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Browser Crypto Benchmark</h1>
<div id="controls">
<label>Chunk size:
<select id="chunkSize">
<option value="1024">1 KB</option>
<option value="4096">4 KB</option>
<option value="16384" selected>16 KB</option>
<option value="65536">64 KB</option>
</select>
</label>
<button id="run">Run Benchmark</button>
</div>
<pre id="output"></pre>
<script src="script.js"></script>
</body>
</html>
